name: Flutter Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_ios:
        description: 'Also run unsigned iOS build'
        required: false
        default: false
        type: boolean

concurrency:
  group: flutter-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.41.6
  JAVA_VERSION: '17'

jobs:
  android:
    name: Android APK and AAB
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HAS_ANDROID_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && 'true' || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Write runtime env file
        shell: bash
        run: |
          cat > .env <<EOF
          APP_DATA_MODE=${APP_DATA_MODE}
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
          EOF
        env:
          APP_DATA_MODE: ${{ secrets.APP_DATA_MODE != '' && secrets.APP_DATA_MODE || 'supabase' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - name: Decode Android keystore
        if: env.HAS_ANDROID_SIGNING == 'true'
        shell: bash
        run: |
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/upload-keystore.jks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Write Android signing properties
        if: env.HAS_ANDROID_SIGNING == 'true'
        shell: bash
        run: |
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_STORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=app/upload-keystore.jks
          EOF
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test test/widget_test.dart

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release App Bundle
        run: flutter build appbundle --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

  ios_unsigned:
    name: iOS Unsigned Build
    if: github.event_name == 'workflow_dispatch' && inputs.build_ios == true
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Write runtime env file
        shell: bash
        run: |
          cat > .env <<EOF
          APP_DATA_MODE=${APP_DATA_MODE}
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
          EOF
        env:
          APP_DATA_MODE: ${{ secrets.APP_DATA_MODE != '' && secrets.APP_DATA_MODE || 'supabase' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - name: Get dependencies
        run: flutter pub get

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned iOS app
        run: |
          cd build/ios/iphoneos
          ditto -c -k --sequesterRsrc --keepParent Runner.app Runner.app.zip

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-build-${{ github.run_number }}
          path: build/ios/iphoneos/Runner.app.zip
          if-no-files-found: error
          retention-days: 7
